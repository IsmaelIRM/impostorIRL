services:
  amongus:
    build: .
    container_name: reallife-amongus
    ports:
      - "3000:3000"
    environment:
      # Leave empty to auto-derive URLs from request (works with ngrok, Cloudflare, etc.)
      PUBLIC_BASE_URL: ""
    volumes:
      # Persist uploaded map images across container restarts
      - ./uploads:/app/public/uploads
    restart: unless-stopped

  # Cloudflare Tunnel sidecar - provides public HTTPS without port forwarding
  # Prints a random *.trycloudflare.com URL in logs (docker compose logs -f cloudflared)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: reallife-amongus-tunnel
    command: ["tunnel", "--url", "http://amongus:3000", "--no-autoupdate"]
    depends_on:
      - amongus
    restart: unless-stopped