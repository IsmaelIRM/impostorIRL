<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d1b2a" />
    <title>Among Us en la vida real</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="icon" href="data:," />
  </head>
  <body>
    <div id="app">
      <div class="loading">Cargando…</div>
    </div>

    <!-- Reconnecting overlay -->
    <div id="reconnect-overlay" class="overlay hidden">
      <div class="spinner"></div>
      <p>Reconectando…</p>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- Audio alarm (Web Audio generated, triggered by event) -->
    <audio id="alarm-audio" loop preload="auto">
      <source
        src="data:audio/wav;base64,UklGRl9vAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA="
        type="audio/wav"
      />
    </audio>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/qrcode.min.js"></script>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
